<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Hexagon outline -->
  <polygon points="32,3 57,17.5 57,46.5 32,61 7,46.5 7,17.5"
           fill="#1a1b26" stroke="#7aa2f7" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Outer ring connections -->
  <line x1="32" y1="9"  x2="51" y2="20" stroke="#7aa2f7" stroke-width="1.2" opacity="0.5"/>
  <line x1="51" y1="20" x2="51" y2="44" stroke="#7aa2f7" stroke-width="1.2" opacity="0.5"/>
  <line x1="51" y1="44" x2="32" y2="55" stroke="#7aa2f7" stroke-width="1.2" opacity="0.5"/>
  <line x1="32" y1="55" x2="13" y2="44" stroke="#7aa2f7" stroke-width="1.2" opacity="0.5"/>
  <line x1="13" y1="44" x2="13" y2="20" stroke="#7aa2f7" stroke-width="1.2" opacity="0.5"/>
  <line x1="13" y1="20" x2="32" y2="9"  stroke="#7aa2f7" stroke-width="1.2" opacity="0.5"/>

  <!-- Center spokes -->
  <line x1="32" y1="32" x2="32" y2="9"  stroke="#9ece6a" stroke-width="1" opacity="0.45"/>
  <line x1="32" y1="32" x2="51" y2="20" stroke="#9ece6a" stroke-width="1" opacity="0.45"/>
  <line x1="32" y1="32" x2="51" y2="44" stroke="#9ece6a" stroke-width="1" opacity="0.45"/>
  <line x1="32" y1="32" x2="32" y2="55" stroke="#9ece6a" stroke-width="1" opacity="0.45"/>
  <line x1="32" y1="32" x2="13" y2="44" stroke="#9ece6a" stroke-width="1" opacity="0.45"/>
  <line x1="32" y1="32" x2="13" y2="20" stroke="#9ece6a" stroke-width="1" opacity="0.45"/>

  <!-- Vertex nodes -->
  <circle cx="32" cy="9"  r="3.5" fill="#7aa2f7"/>
  <circle cx="51" cy="20" r="3.5" fill="#7aa2f7"/>
  <circle cx="51" cy="44" r="3.5" fill="#7aa2f7"/>
  <circle cx="32" cy="55" r="3.5" fill="#7aa2f7"/>
  <circle cx="13" cy="44" r="3.5" fill="#7aa2f7"/>
  <circle cx="13" cy="20" r="3.5" fill="#7aa2f7"/>

  <!-- Center hub -->
  <circle cx="32" cy="32" r="7" fill="#1f2335" stroke="#9ece6a" stroke-width="2"/>
  <circle cx="32" cy="32" r="3.5" fill="#9ece6a"/>
</svg>
